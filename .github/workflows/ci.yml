name: CI

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        violet: [stable, current]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: violet-prover/setup-violet@v1.1.0
        with:
          violet-version: ${{ matrix.violet }}
      - name: Type Check
        run: violet check
